<!DOCTYPE html>
<html>
<head>
<title>Pi Sky Tracker - Fly. Shoot. Earn Pi.</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:Arial; }
body { background:#000; color:white; overflow:hidden; }

/* HEADER RAPI */
#gameHeader {
  position:absolute; top:0; left:0; width:100%; height:65px;
  background:rgba(17,17,17,0.95); backdrop-filter:blur(10px);
  display:flex; justify-content:space-between; align-items:center;
  padding:8px 10px; z-index:5; gap:8px;
}
.headerBtn {
  background:#6F2DA8; border:none; color:white; border-radius:12px;
  padding:10px 5px; font-size:12px; font-weight:bold;
  flex:1; height:100%;
  display:flex; align-items:center; justify-content:center;
}
#scoreBox {
  background:#1a1a1a; border:2px solid #6F2DA8; border-radius:12px;
  flex:1; height:100%;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
}
#scoreText { font-size:16px; font-weight:bold; color:#FFD700; }
#scoreSub { font-size:11px; }

/* CANVAS */
#gameCanvas { display:block; touch-action:none; background:#000; position:absolute; top:65px; }

/* FOOTER RAPI */
#gameFooter {
  position:absolute; bottom:0; left:0; width:100%; height:75px;
  background:rgba(17,17,17,0.95); backdrop-filter:blur(10px);
  display:flex; justify-content:space-between; align-items:center;
  padding:8px 10px; z-index:5; gap:8px;
}
.footerBtn {
  background:#6F2DA8; border:none; color:white; border-radius:12px;
  padding:10px 5px; font-size:14px; font-weight:bold;
  flex:1; height:100%;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
}
#fireBtn { background:#FF2D55; font-size:18px; }
#bomBtn { background:#FF6D00; }

/* POPUP */
.popup {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  background:#222; padding:25px; border-radius:15px; text-align:center;
  display:none; z-index:10; border:2px solid #6F2DA8; width:80%;
}
.popup button {
  padding:10px 20px; background:#6F2DA8; border:none; color:white;
  border-radius:8px; margin-top:15px; margin-right:10px;
}
</style>
</head>

<body>
<!-- HEADER -->
<div id="gameHeader">
  <button class="headerBtn" onclick="openPopup('topupPopup')">💎<br>TOP UP</button>
  <div id="scoreBox">
    <div id="scoreText">SCORE: <span id="score">0</span></div>
    <div id="scoreSub">PI: <span id="pi">10</span> | ❤️<span id="lives">7</span></div>
  </div>
  <button class="headerBtn" id="startBtn" onclick="startGame()">START</button>
</div>

<!-- GAME -->
<canvas id="gameCanvas"></canvas>

<!-- FOOTER -->
<div id="gameFooter">
  <button class="footerBtn" onclick="openPopup('upgradePopup')">⚡<br>UPGRADE</button>
  <button class="footerBtn" id="fireBtn" onclick="fireBullet()">FIRE<br>🔥</button>
  <button class="footerBtn" id="bomBtn" onclick="useBomb()">💣<br>BOM 3</button>
</div>

<!-- POPUP -->
<div id="topupPopup" class="popup"><h2>💎 TOP UP PI</h2><p>Tambah 10 Pi Game Gratis</p><button onclick="topUp()">Klaim 10 Pi</button><button onclick="closePopup('topupPopup')">Tutup</button></div>
<div id="upgradePopup" class="popup"><h2>⚡ UPGRADE</h2><p>Harga: 5 Pi</p><p>Damage +1 & Kecepatan +</p><button onclick="upgrade()">Beli Upgrade</button><button onclick="closePopup('upgradePopup')">Tutup</button></div>
<div id="gameOverPopup" class="popup"><h2>GAME OVER</h2><p id="popupText"></p><button id="payBtn">Lanjut 1 Pi</button><button onclick="closePopup('gameOverPopup')">Keluar</button></div>

<script>
let isGameRunning = false;
let gameData = { pi: 10, lives: 7, level: 1, score: 0, highScore: 0, bombs: 3, damage: 1 };

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight - 140; // 65 header + 75 footer
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// GAME
let player = { x: 0, y: 0 };
let bullets = [];
let enemies = [];
let gameLoop;

canvas.addEventListener('touchstart', e => { movePlayer(e); });
canvas.addEventListener('touchmove', e => { movePlayer(e); });
function movePlayer(e){
  e.preventDefault();
  let touch = e.touches[0];
  if(touch.clientY > 65 && touch.clientY < window.innerHeight - 75){
    player.x = touch.clientX;
  }
}

function startGame() {
  if(isGameRunning) return;
  player.x = canvas.width/2;
  player.y = canvas.height-50;
  isGameRunning = true;
  resetGame();
  gameLoop = setInterval(updateGame, 1000/60);
  document.getElementById('startBtn').innerText = "PAUSE";
}

function resetGame() {
  gameData.lives = 7; gameData.level = 1; gameData.score = 0; gameData.bombs = 3;
  bullets = []; enemies = []; updateUI();
}

function fireBullet() {
  if (isGameRunning) bullets.push({x: player.x, y: player.y-25});
}

function openPopup(id){ document.getElementById(id).style.display = 'block'; }
function closePopup(id){ document.getElementById(id).style.display = 'none'; }

function topUp() {
  gameData.pi += 10;
  alert('+10 Pi Game ditambahkan!');
  updateUI();
  closePopup('topupPopup');
}

function upgrade() {
  if(gameData.pi >= 5){
    gameData.pi -= 5;
    gameData.damage += 1;
    alert('Upgrade Berhasil! Damage: ' + gameData.damage);
    closePopup('upgradePopup');
  } else { alert('Pi tidak cukup!'); }
}

function useBomb() {
  if(gameData.bombs > 0 && isGameRunning){
    gameData.bombs--;
    enemies = [];
    gameData.score += 50;
    alert('BOM MELEDAK! +50 Score');
    updateUI();
  } else { alert('BOM HABIS!'); }
}

function drawPlayer() {
  // Pesawat
  ctx.fillStyle = '#6F2DA8';
  ctx.beginPath();
  ctx.moveTo(player.x, player.y - 20);
  ctx.lineTo(player.x - 15, player.y + 10);
  ctx.lineTo(player.x + 15, player.y + 10);
  ctx.closePath();
  ctx.fill();
  // Api
  ctx.fillStyle = '#FFD700';
  ctx.beginPath();
  ctx.moveTo(player.x, player.y + 10);
  ctx.lineTo(player.x - 5, player.y + 20);
  ctx.lineTo(player.x + 5, player.y + 20);
  ctx.closePath();
  ctx.fill();
  // LOGO PI
  ctx.fillStyle = '#FFD700';
  ctx.beginPath();
  ctx.arc(player.x, player.y - 30, 10, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#6F2DA8';
  ctx.font = "bold 14px Arial";
  ctx.textAlign = "center";
  ctx.fillText("π", player.x, player.y - 25);
}

function updateGame() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  // Bintang
  ctx.fillStyle = 'white';
  for(let i=0; i<50; i++){ ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 1, 1); }

  drawPlayer();

  if (Math.random() < 0.03 + gameData.level*0.002) enemies.push({x: Math.random()*canvas.width, y: 0, size: 20});

  enemies.forEach((e,i) => {
    e.y += 2 + gameData.level * 0.5;
    ctx.fillStyle = 'red';
    ctx.fillRect(e.x, e.y, e.size, e.size);
    if (e.y > player.y-20 && e.x > player.x-15 && e.x < player.x+15) {
      gameData.lives--; enemies.splice(i,1);
      if (gameData.lives <= 0) gameOver();
    }
    if (e.y > canvas.height) enemies.splice(i,1);
  });

  bullets.forEach((b,i) => {
    b.y -= 10;
    ctx.fillStyle = 'yellow';
    ctx.fillRect(b.x-2, b.y, 4, 10);
    enemies.forEach((e,j) => {
      if (b.y < e.y+20 && b.x > e.x && b.x < e.x+20) {
        gameData.pi += 1; gameData.score += 10 * gameData.damage;
        bullets.splice(i,1); enemies.splice(j,1);
      }
    });
    if (b.y < 0) bullets.splice(i,1);
  });

  if (gameData.score > gameData.level * 100) gameData.level++;
  updateUI();
}

function gameOver() {
  clearInterval(gameLoop);
  isGameRunning = false;
  document.getElementById('startBtn').innerText = "START";
  document.getElementById('popupText').innerText = `Skor Akhir: ${gameData.score}`;
  openPopup('gameOverPopup');
  if (gameData.score > gameData.highScore) gameData.highScore = gameData.score;
}

document.getElementById('payBtn').onclick = () => {
  if (gameData.pi >= 1) {
    gameData.pi -= 1;
    closePopup('gameOverPopup');
    startGame();
  } else { alert('Pi Game tidak cukup! Top Up dulu'); }
}

function updateUI() {
  document.getElementById('score').innerText = gameData.score;
  document.getElementById('pi').innerText = gameData.pi;
  document.getElementById('lives').innerText = gameData.lives;
  document.getElementById('bomBtn').innerHTML = `💣<br>BOM ${gameData.bombs}`;
}
updateUI();
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Pi Sky Tracker - Fly. Shoot. Earn Pi.</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>π</text></svg>">
<meta name="description" content="Pi Sky Tracker - Game pesawat tembak, tracker statistik, dan marketplace Pi">
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:Arial; }
body { background:#111; color:white; overflow:hidden; }

#container { display:flex; width:300vw; height:100vh; transition: transform 0.3s ease; }
.view { width:100vw; height:100vh; flex-shrink:0; position:relative; }

/* 1. HOME - MY TRACKER */
#home { background:#1a1a1a; padding:20px; }
#home h1 { color:#6F2DA8; text-align:center; margin-bottom:20px; }
.card { background:#222; padding:15px; border-radius:10px; margin-bottom:15px; }

/* 2. GAME */
#gameView { background:#000; }
#gameCanvas { display:block; touch-action:none; }
#gameUI { position:absolute; top:10px; width:100%; display:flex; justify-content:space-between; padding:0 20px; font-size:16px; }
#startBtn { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); padding:15px 30px; background:#6F2DA8; border:none; color:white; border-radius:10px; font-size:18px; }

/* 3. MARKET */
#market { background:#1a1a1a; padding:20px; overflow-y:auto; }
.item { background:#222; padding:15px; border-radius:10px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; }
.buyBtn { background:#6F2DA8; border:none; color:white; padding:8px 15px; border-radius:8px; }

#dots { position:absolute; bottom:20px; width:100%; text-align:center; }
.dot { display:inline-block; width:10px; height:10px; background:#555; border-radius:50%; margin:0 5px; }
.dot.active { background:#6F2DA8; }

#popup { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:#333; padding:20px; border-radius:15px; text-align:center; display:none; z-index:10; }
/* FOOTER GAME */
#gameFooter {
  position:absolute; bottom:0; left:0; width:100%; height:70px;
  background:rgba(17,17,17,0.9); backdrop-filter:blur(10px);
  display:flex; justify-content:space-between; align-items:center;
  padding:0 10px; z-index:5;
}
.footerBtn {
  background:#6F2DA8; border:none; color:white; border-radius:12px;
  padding:12px 18px; font-size:14px; font-weight:bold;
}
#fireBtn { background:#FF2D55; font-size:18px; }
#starBtn { background:#FFD700; color:#111; }
</style>
</head>

<body>
<h1>🚀 PI SKY TRACKER</h1>
<p style="text-align:center; color:#6F2DA8; margin-bottom:20px;">Fly. Shoot. Earn Pi.</p>

<div id="container">
  <!-- VIEW 1: MY TRACKER -->
  <div class="view" id="home">
    <h1>📊 MY TRACKER</h1>
    <div class="card">
      <h3>Saldo Pi Game</h3>
      <p id="homePi">0 Pi</p>
    </div>
    <div class="card">
      <h3>Statistik</h3>
      <p>Level Tertinggi: <span id="highLevel">1</span></p>
      <p>Skor Tertinggi: <span id="highScore">0</span></p>
    </div>
    <p style="text-align:center; margin-top:50px;">← Swipe Kanan = Game | Swipe Kiri = Market →</p>
  </div>

  <!-- VIEW 2: GAME -->
  <div class="view" id="gameView">
    <div id="gameUI">
      <div>❤️ <span id="lives">7</span></div>
      <div>⭐ <span id="level">1</span></div>
      <div>🪙 <span id="pi">0</span></div>
    </div>
    <button id="startBtn">MULAI GAME</button>
    <canvas id="gameCanvas"></canvas>
    <div id="gameFooter">
  <button class="footerBtn" onclick="goToMarket()">🛒 BELI</button>
  <button class="footerBtn" id="starBtn">★ <span id="footerLevel">1</span></button>
  <button class="footerBtn" id="fireBtn">FIRE 🔥</button>
    </div>
    <div id="popup">
      <h2 id="popupTitle"></h2>
      <p id="popupText"></p>
      <button id="payBtn" style="padding:10px 20px; background:#6F2DA8; border:none; color:white; border-radius:8px; margin-top:10px;">Lanjut Bayar 1 Pi</button>
    </div>
  </div>

  <!-- VIEW 3: MARKET -->
  <div class="view" id="market">
    <h2 style="color:#6F2DA8; text-align:center; margin-bottom:20px;">🛒 MARKETPLACE</h2>
    <div class="item">
      <div><h4>Extra Nyawa +3</h4><p>Harga: 2 Pi</p></div>
      <button class="buyBtn" onclick="buyItem(2, 'lives')">Beli</button>
    </div>
    <div class="item">
      <div><h4>Skin Pesawat Emas</h4><p>Harga: 5 Pi</p></div>
      <button class="buyBtn" onclick="buyItem(5, 'skin')">Beli</button>
    </div>
    <div class="item">
      <div><h4>Perisai 30s</h4><p>Harga: 3 Pi</p></div>
      <button class="buyBtn" onclick="buyItem(3, 'shield')">Beli</button>
    </div>
  </div>
</div>

<div id="dots">
  <span class="dot active"></span>
  <span class="dot"></span>
  <span class="dot"></span>
</div>

<script>
let currentView = 1;
let startX = 0;
let isGameRunning = false;
let gameData = { pi: 10, lives: 7, level: 1, score: 0, highScore: 0, highLevel: 1 }; // Kasih 10 Pi awal buat tes

const container = document.getElementById('container');
const dots = document.querySelectorAll('.dot');
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight - 70; // Kurangi tinggi footer
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// 1. SWIPE NAVIGATION
document.addEventListener('touchstart', e => { if(currentView!== 1) startX = e.touches[0].clientX; });
document.addEventListener('touchend', e => {
  if(currentView!== 1){
    let endX = e.changedTouches[0].clientX;
    let diff = startX - endX;
    if (Math.abs(diff) > 50) {
      if (diff > 0 && currentView < 2) currentView++;
      if (diff < 0 && currentView > 0) currentView--;
      updateView();
    }
  }
});
function updateView() {
  container.style.transform = `translateX(-${currentView * 100}vw)`;
  dots.forEach((dot, i) => { dot.classList.toggle('active', i === currentView); });
}
function goToMarket(){ currentView = 2; updateView(); }

// 2. GAME LOGIC BARU
let player = { x: canvas.width/2, y: canvas.height-100, size: 25 };
let bullets = [];
let enemies = [];
let gameLoop;
let isDragging = false;

// GERAKIN PESAWAT PAKE DRAG
canvas.addEventListener('touchstart', e => { isDragging = true; movePlayer(e); });
canvas.addEventListener('touchmove', e => { if(isDragging) movePlayer(e); });
canvas.addEventListener('touchend', () => { isDragging = false; });
function movePlayer(e){
  let touch = e.touches[0];
  player.x = touch.clientX;
}

document.getElementById('startBtn').onclick = () => {
  document.getElementById('startBtn').style.display = 'none';
  document.getElementById('gameFooter').style.display = 'flex';
  isGameRunning = true;
  resetGame();
  gameLoop = setInterval(updateGame, 1000/60);
}

document.getElementById('fireBtn').onclick = () => {
  if (isGameRunning) bullets.push({x: player.x, y: player.y-25});
}

function resetGame() {
  gameData.lives = 7; gameData.level = 1; gameData.score = 0;
  bullets = []; enemies = []; updateUI();
}

function drawPlayer() {
  // Gambar pesawat segitiga
  ctx.fillStyle = '#6F2DA8';
  ctx.beginPath();
  ctx.moveTo(player.x, player.y - 20);
  ctx.lineTo(player.x - 15, player.y + 10);
  ctx.lineTo(player.x + 15, player.y + 10);
  ctx.closePath();
  ctx.fill();
  // Api
  ctx.fillStyle = '#FFD700';
  ctx.beginPath();
  ctx.moveTo(player.x, player.y + 10);
  ctx.lineTo(player.x - 5, player.y + 20);
  ctx.lineTo(player.x + 5, player.y + 20);
  ctx.closePath();
  ctx.fill();
}

function updateGame() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawPlayer();
  
  if (Math.random() < 0.03) enemies.push({x: Math.random()*canvas.width, y: 0, size: 20});
  
  enemies.forEach((e,i) => {
    e.y += 2 + gameData.level * 0.5;
    ctx.fillStyle = 'red';
    ctx.fillRect(e.x, e.y, e.size, e.size);
    if (e.y > player.y-20 && e.x > player.x-15 && e.x < player.x+15) {
      gameData.lives--; enemies.splice(i,1);
      if (gameData.lives <= 0) gameOver();
    }
    if (e.y > canvas.height) enemies.splice(i,1);
  });
  
  bullets.forEach((b,i) => {
    b.y -= 10;
    ctx.fillStyle = 'yellow';
    ctx.fillRect(b.x-2, b.y, 4, 10);
    enemies.forEach((e,j) => {
      if (b.y < e.y+20 && b.x > e.x && b.x < e.x+20) {
        gameData.pi += 1; gameData.score += 10;
        bullets.splice(i,1); enemies.splice(j,1);
      }
    });
    if (b.y < 0) bullets.splice(i,1);
  });
  
  if (gameData.score > gameData.level * 100) gameData.level++;
  updateUI();
}

function gameOver() {
  clearInterval(gameLoop); isGameRunning = false;
  document.getElementById('popup').style.display = 'block';
  document.getElementById('popupTitle').innerText = 'GAME OVER';
  document.getElementById('popupText').innerText = `Skor: ${gameData.score}. Lanjut bayar 1 Pi?`;
  if (gameData.score > gameData.highScore) {
    gameData.highScore = gameData.score; gameData.highLevel = gameData.level;
  }
}

document.getElementById('payBtn').onclick = () => {
  if (gameData.pi >= 1) {
    gameData.pi -= 1;
    document.getElementById('popup').style.display = 'none';
    document.getElementById('startBtn').style.display = 'block';
    document.getElementById('gameFooter').style.display = 'none';
  } else { alert('Pi Game tidak cukup!'); }
}

function buyItem(price, type) {
  if (gameData.pi >= price) {
    gameData.pi -= price;
    if (type === 'lives') gameData.lives += 3;
    alert('Pembelian Berhasil!'); updateUI();
  } else { alert('Pi Game tidak cukup!'); }
}

function updateUI() {
  document.getElementById('lives').innerText = gameData.lives;
  document.getElementById('level').innerText = gameData.level;
  document.getElementById('footerLevel').innerText = gameData.level;
  document.getElementById('pi').innerText = gameData.pi;
  document.getElementById('homePi').innerText = gameData.pi + ' Pi';
  document.getElementById('highScore').innerText = gameData.highScore;
  document.getElementById('highLevel').innerText = gameData.highLevel;
}
updateUI();
</script>
</body>
        </html>

<!DOCTYPE html>
<html>
<head>
<title>Pi Sky Tracker - Fly. Shoot. Earn Pi.</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:Arial; }
body { background:#000; color:white; overflow:hidden; }

#gameHeader {
  position:absolute; top:0; left:0; width:100%; height:65px;
  background:rgba(17,17,17,0.95); backdrop-filter:blur(10px);
  display:flex; justify-content:space-between; align-items:center;
  padding:8px 10px; z-index:5; gap:8px;
}
.headerBtn {
  background:#6F2DA8; border:none; color:white; border-radius:12px;
  padding:10px 5px; font-size:12px; font-weight:bold;
  flex:1; height:100%;
  display:flex; align-items:center; justify-content:center;
}
#scoreBox {
  background:#1a1a1a; border:2px solid #6F2DA8; border-radius:12px;
  flex:1; height:100%;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
}

#soundBtn {
  position:absolute; top:70px; right:10px; z-index:6;
  background:rgba(0,0,0,0.6); border:1px solid #6F2DA8; color:white;
  font-size:18px; padding:8px 10px; border-radius:50%; cursor:pointer;
}

#scoreText { font-size:16px; font-weight:bold; color:#FFD700; }
#scoreSub { font-size:11px; }

#gameCanvas { display:block; touch-action:none; background:#000; position:absolute; top:65px; }

#gameFooter {
  position:absolute; bottom:0; left:0; width:100%; height:75px;
  background:rgba(17,17,17,0.95); backdrop-filter:blur(10px);
  display:flex; justify-content:space-between; align-items:center;
  padding:8px 10px; z-index:5; gap:8px;
}
.footerBtn {
  background:#6F2DA8; border:none; color:white; border-radius:12px;
  padding:10px 5px; font-size:14px; font-weight:bold;
  flex:1; height:100%;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
}
#fireBtn { background:#FF2D55; font-size:18px; }
#bomBtn { background:#FF6D00; }

.popup {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  background:#222; padding:25px; border-radius:15px; text-align:center;
  display:none; z-index:10; border:2px solid #6F2DA8; width:80%;
}
.popup button {
  padding:10px 20px; background:#6F2DA8; border:none; color:white;
  border-radius:8px; margin-top:15px; margin-right:10px;
}
</style>
</head>

<body>
<div id="gameHeader">
  <button class="headerBtn" onclick="openPopup('topupPopup')">💎<br>TOP UP</button>
  <div id="scoreBox">
    <div id="scoreText">SCORE: <span id="score">0</span></div>
    <div id="scoreSub">PI: <span id="pi">10</span> | ❤️<span id="lives">7</span></div>
  </div>
  <button class="headerBtn" id="startBtn" onclick="startGame()">START</button>
</div>

<button id="soundBtn" onclick="toggleSound()">🔊</button>

<canvas id="gameCanvas"></canvas>

<div id="gameFooter">
  <button class="footerBtn" onclick="openPopup('upgradePopup')">⚡<br>UPGRADE</button>
  <button class="footerBtn" id="fireBtn" onclick="fireBullet()">FIRE<br>🔥</button>
  <button class="footerBtn" id="bomBtn" onclick="useBomb()">💣<br>BOM 3</button>
</div>

<div id="topupPopup" class="popup"><h2>💎 TOP UP PI</h2><p>Tambah 10 Pi Game Gratis</p><button onclick="topUp()">Klaim 10 Pi</button><button onclick="closePopup('topupPopup')">Tutup</button></div>
<div id="upgradePopup" class="popup"><h2>⚡ UPGRADE</h2><p>Harga: 5 Pi</p><p>Damage +1 & Kecepatan +</p><button onclick="upgrade()">Beli Upgrade</button><button onclick="closePopup('upgradePopup')">Tutup</button></div>
<div id="gameOverPopup" class="popup"><h2>GAME OVER</h2><p id="popupText"></p><button id="payBtn">Lanjut 1 Pi</button><button onclick="closePopup('gameOverPopup')">Keluar</button></div>

<script>
let isGameRunning = false;
let soundOn = true;
let musicPlaying = false;
let gameData = { pi: 10, lives: 7, level: 1, score: 0, highScore: 0, bombs: 3, damage: 1 };

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight - 140;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ===== BACKGROUND NEBULA =====
let stars = [];
let nebulaOffset = 0;

function initBackground(){
  stars = [];
  for(let i=0; i<100; i++){
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: Math.random() * 2,
      speed: 0.5 + Math.random()
    });
  }
}

function drawBackground(){
  nebulaOffset += 0.2;
  const gradient = ctx.createLinearGradient(0, nebulaOffset, canvas.width, canvas.height + nebulaOffset);
  gradient.addColorStop(0, '#1a0033');
  gradient.addColorStop(0.5, '#330066');
  gradient.addColorStop(1, '#000011');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  stars.forEach(star => {
    star.y += star.speed;
    if(star.y > canvas.height){
      star.y = 0;
      star.x = Math.random() * canvas.width;
    }
    ctx.fillStyle = 'white';
    ctx.globalAlpha = 0.5 + Math.random() * 0.5;
    ctx.beginPath();
    ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  });
}

// ===== EFEK LEDAKAN =====
let particles = [];

function createExplosion(x, y, color){
  for(let i=0; i<15; i++){
    particles.push({
      x: x,
      y: y,
      vx: (Math.random() - 0.5) * 8,
      vy: (Math.random() - 0.5) * 8,
      size: Math.random() * 4 + 2,
      color: color,
      life: 30
    });
  }
}

function updateParticles(){
  particles.forEach((p, i) => {
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    p.size *= 0.95;
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life / 30;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    if(p.life <= 0) particles.splice(i, 1);
  });
}

// ===== AUDIO SYSTEM =====
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let musicInterval;

function playSound(type){
  if(!soundOn) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);

  if(type === 'shoot'){
    osc.frequency.value = 800;
    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
    osc.start(); osc.stop(audioCtx.currentTime + 0.1);
  }
  if(type === 'hit'){
    osc.frequency.value = 200;
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
    osc.start(); osc.stop(audioCtx.currentTime + 0.2);
  }
  if(type === 'explosion'){
    osc.frequency.value = 100;
    gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
    osc.start(); osc.stop(audioCtx.currentTime + 0.4);
  }
  if(type === 'gameover'){
    osc.frequency.value = 150;
    gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
    osc.start(); osc.stop(audioCtx.currentTime + 0.5);
  }
}

function playMusic(){
  if(musicPlaying) return;
  musicPlaying = true;
  let note = 0;
  const notes = [523, 659, 784, 1046, 784, 659];

  musicInterval = setInterval(() => {
    if(!soundOn ||!isGameRunning) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.value = notes;
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.3);
    note = (note + 1) % notes.length;
  }, 300);
}

function stopMusic(){
  musicPlaying = false;
  clearInterval(musicInterval);
}

function toggleSound(){
  soundOn =!soundOn;
  document.getElementById('soundBtn').innerText = soundOn? "🔊" : "🔇";
  if(soundOn && isGameRunning) playMusic();
  if(!soundOn) stopMusic();
}

// GAME
let player = { x: 0, y: 0 };
let bullets = [];
let enemies = [];
let gameLoop;

const enemyColors = ['#FF2D55', '#00D4FF', '#FFD700', '#00FF88', '#FF00FF'];

canvas.addEventListener('touchstart', e => {
  audioCtx.resume();
  if(!musicPlaying && isGameRunning) playMusic();
  movePlayer(e);
});
canvas.addEventListener('touchmove', e => { movePlayer(e); });
function movePlayer(e){
  e.preventDefault();
  let touch = e.touches[0];
  if(touch.clientY > 65 && touch.clientY < window.innerHeight - 75){
    player.x = touch.clientX;
    player.y = touch.clientY - 65;
  }
}

function startGame() {
  if(isGameRunning) return;
  audioCtx.resume();
  initBackground();
  player.x = canvas.width/2;
  player.y = canvas.height-80;
  isGameRunning = true;
  resetGame();
  playMusic();
  gameLoop = setInterval(updateGame, 1000/60);
  document.getElementById('startBtn').innerText = "PAUSE";
}

function resetGame() {
  gameData.lives = 7; gameData.level = 1; gameData.score = 0; gameData.bombs = 3;
  bullets = []; enemies = []; particles = []; updateUI();
}

function fireBullet() {
  if (isGameRunning) {
    bullets.push({x: player.x, y: player.y-60});
    playSound('shoot');
  }
}

function openPopup(id){ document.getElementById(id).style.display = 'block'; }
function closePopup(id){ document.getElementById(id).style.display = 'none'; }

function topUp() {
  gameData.pi += 10;
  alert('+10 Pi Game ditambahkan!');
  updateUI();
  closePopup('topupPopup');
}

function upgrade() {
  if(gameData.pi >= 5){
    gameData.pi -= 5;
    gameData.damage += 1;
    alert('Upgrade Berhasil! Damage: ' + gameData.damage);
    closePopup('upgradePopup');
  } else { alert('Pi tidak cukup!'); }
}

function useBomb() {
  if(gameData.bombs > 0 && isGameRunning){
    gameData.bombs--;
    enemies.forEach(e => createExplosion(e.x, e.y, e.color)); // ledakin semua
    enemies = [];
    gameData.score += 50;
    playSound('explosion');
    alert('BOM MELEDAK! +50 Score');
    updateUI();
  } else { alert('BOM HABIS!'); }
}

function drawPlayer() {
  const size = 3;
  ctx.fillStyle = '#6F2DA8';
  ctx.beginPath();
  ctx.moveTo(player.x, player.y - 20*size);
  ctx.lineTo(player.x - 15*size, player.y + 10*size);
  ctx.lineTo(player.x + 15*size, player.y + 10*size);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = '#FFD700';
  ctx.beginPath();
  ctx.arc(player.x, player.y - 5*size, 9*size, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#6F2DA8';
  ctx.font = `bold ${12*size}px Arial`;
  ctx.textAlign = "center";
  ctx.fillText("π", player.x, player.y - 1*size);

  ctx.fillStyle = '#FFD700';
  ctx.beginPath();
  ctx.moveTo(player.x, player.y + 10*size);
  ctx.lineTo(player.x - 5*size, player.y + 20*size);
  ctx.lineTo(player.x + 5*size, player.y + 20*size);
  ctx.closePath();
  ctx.fill();
}

function drawEnemyPlane(x, y, size, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x, y - 10);
  ctx.lineTo(x - 8, y + 5);
  ctx.lineTo(x + 8, y + 5);
  ctx.closePath();
  ctx.fill();
  ctx.fillRect(x-12, y-2, 24, 4);
}

function updateGame() {
  drawBackground();
  updateParticles(); // UPDATE LEDAKAN
  drawPlayer();

  if (Math.random() < 0.03 + gameData.level*0.002) {
    enemies.push({
      x: Math.random()*canvas.width,
      y: 0,
      size: 20,
      color: enemyColors[Math.floor(Math.random()*enemyColors.length)]
    });
  }

  enemies.forEach((e,i) => {
    e.y += 2 + gameData.level * 0.5;
    drawEnemyPlane(e.x, e.y, e.size, e.color);

    if (e.y > player.y-30 && e.x > player.x-50 && e.x < player.x+50) {
      createExplosion(player.x, player.y, '#FFD700'); // LEDAKAN PAS KENA
      gameData.lives--; enemies.splice(i,1);
      playSound('hit');
      if (gameData.lives <= 0) gameOver();
    }
    if (e.y > canvas.height) enemies.splice(i,1);
  });

  bullets.forEach((b,i) => {
    b.y -= 10;
    ctx.fillStyle = 'yellow';
    ctx.fillRect(b.x-3, b.y, 6, 12);
    enemies.forEach((e,j) => {
      if (b.y < e.y+15 && b.x > e.x-10 && b.x < e.x+10) {
        createExplosion(e.x, e.y, e.color); // LEDAKAN PAS MATI
        gameData.pi += 1; gameData.score += 10 * gameData.damage;
        playSound('explosion');
        bullets.splice(i,1); enemies.splice(j,1);
      }
    });
    if (b.y < 0) bullets.splice(i,1);
  });

  if (gameData.score > gameData.level * 100) gameData.level++;
  updateUI();
}

function gameOver() {
  clearInterval(gameLoop);
  isGameRunning = false;
  stopMusic();
  playSound('gameover');
  document.getElementById('startBtn').innerText = "START";
  document.getElementById('popupText').innerText = `Skor Akhir: ${gameData.score}`;
  openPopup('gameOverPopup');
  if (gameData.score > gameData.highScore) gameData.highScore = gameData.score;
}

document.getElementById('payBtn').onclick = () => {
  if (gameData.pi >= 1) {
    gameData.pi -= 1;
    closePopup('gameOverPopup');
    startGame();
  } else { alert('Pi Game tidak cukup! Top Up dulu'); }
}

function updateUI() {
  document.getElementById('score').innerText = gameData.score;
  document.getElementById('pi').innerText = gameData.pi;
  document.getElementById('lives').innerText = gameData.lives;
  document.getElementById('bomBtn').innerHTML = `💣<br>BOM ${gameData.bombs}`;
}
updateUI();
</script>
</body>
                                                                                                                                                          </html>

<!DOCTYPE html>
<html>
<head>
<title>Pi Sky Tracker - Fly. Shoot. Earn Pi.</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>π</text></svg>">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:Arial; }
body { background:#000; color:white; overflow:hidden; }

/* HEADER 1 LAYAR */
#gameHeader {
  position:absolute; top:0; left:0; width:100%; height:60px;
  background:rgba(17,17,17,0.95); backdrop-filter:blur(10px);
  display:flex; justify-content:space-between; align-items:center;
  padding:0 10px; z-index:5;
}
.headerBtn {
  background:#6F2DA8; border:none; color:white; border-radius:10px;
  padding:10px 12px; font-size:12px; font-weight:bold;
}
#scoreText { font-size:16px; font-weight:bold; color:#FFD700; }

/* CANVAS */
#gameCanvas { display:block; touch-action:none; background:#000; }

/* FOOTER 1 LAYAR */
#gameFooter {
  position:absolute; bottom:0; left:0; width:100%; height:70px;
  background:rgba(17,17,17,0.95); backdrop-filter:blur(10px);
  display:flex; justify-content:space-between; align-items:center;
  padding:0 10px; z-index:5;
}
.footerBtn {
  background:#6F2DA8; border:none; color:white; border-radius:12px;
  padding:12px 15px; font-size:14px; font-weight:bold; flex:1; margin:0 5px;
}
#fireBtn { background:#FF2D55; font-size:20px; flex:2; }
#bomBtn { background:#FF6D00; }

/* POPUP UMUM */
.popup {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  background:#222; padding:25px; border-radius:15px; text-align:center;
  display:none; z-index:10; border:2px solid #6F2DA8; width:80%;
}
.popup button {
  padding:10px 20px; background:#6F2DA8; border:none; color:white;
  border-radius:8px; margin-top:15px; margin-right:10px;
}
</style>
</head>

<body>
<!-- HEADER -->
<div id="gameHeader">
  <button class="headerBtn" onclick="openPopup('topupPopup')">💎 TOP UP</button>
  <div>
    <div id="scoreText">SCORE: <span id="score">0</span></div>
    <div style="font-size:12px;">PI: <span id="pi">10</span> | ❤️<span id="lives">7</span></div>
  </div>
  <button class="headerBtn" id="startBtn">START</button>
</div>

<!-- GAME -->
<canvas id="gameCanvas"></canvas>

<!-- FOOTER -->
<div id="gameFooter">
  <button class="footerBtn" onclick="openPopup('upgradePopup')">⚡ UPGRADE</button>
  <button class="footerBtn" id="fireBtn">FIRE 🔥</button>
  <button class="footerBtn" id="bomBtn">💣 BOM 3</button>
</div>

<!-- POPUP TOP UP -->
<div id="topupPopup" class="popup">
  <h2>💎 TOP UP PI</h2>
  <p>Tambah 10 Pi Game Gratis</p>
  <button onclick="topUp()">Klaim 10 Pi</button>
  <button onclick="closePopup('topupPopup')">Tutup</button>
</div>

<!-- POPUP UPGRADE -->
<div id="upgradePopup" class="popup">
  <h2>⚡ UPGRADE</h2>
  <p>Harga: 5 Pi</p>
  <p>Damage +1 & Kecepatan +</p>
  <button onclick="upgrade()">Beli Upgrade</button>
  <button onclick="closePopup('upgradePopup')">Tutup</button>
</div>

<!-- POPUP GAME OVER -->
<div id="gameOverPopup" class="popup">
  <h2 id="popupTitle">GAME OVER</h2>
  <p id="popupText"></p>
  <button id="payBtn">Lanjut 1 Pi</button>
  <button onclick="closePopup('gameOverPopup')">Keluar</button>
</div>

<script>
let isGameRunning = false;
let gameData = { pi: 10, lives: 7, level: 1, score: 0, highScore: 0, bombs: 3, damage: 1 };

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight - 130; // 60 header + 70 footer
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// GAME
let player = { x: 0, y: 0, size: 25 };
let bullets = [];
let enemies = [];
let gameLoop;
let isDragging = false;

canvas.addEventListener('touchstart', e => { isDragging = true; movePlayer(e); });
canvas.addEventListener('touchmove', e => { if(isDragging) movePlayer(e); });
canvas.addEventListener('touchend', () => { isDragging = false; });
function movePlayer(e){
  let touch = e.touches[0];
  if(touch.clientY > 60 && touch.clientY < window.innerHeight - 70){
    player.x = touch.clientX;
  }
}

document.getElementById('startBtn').onclick = startGame;
document.getElementById('fireBtn').onclick = () => {
  if (isGameRunning) bullets.push({x: player.x, y: player.y-25});
}

function startGame() {
  player.x = canvas.width/2; player.y = canvas.height-50;
  isGameRunning = true;
  resetGame();
  gameLoop = setInterval(updateGame, 1000/60);
}

function resetGame() {
  gameData.lives = 7; gameData.level = 1; gameData.score = 0; gameData.bombs = 3;
  bullets = []; enemies = []; updateUI();
}

// POPUP FUNCTION
function openPopup(id){ document.getElementById(id).style.display = 'block'; }
function closePopup(id){ document.getElementById(id).style.display = 'none'; }

// FITUR POPUP
function topUp() {
  gameData.pi += 10;
  alert('+10 Pi Game ditambahkan!');
  updateUI();
  closePopup('topupPopup');
}

function upgrade() {
  if(gameData.pi >= 5){
    gameData.pi -= 5;
    gameData.damage += 1;
    alert('Upgrade Berhasil! Damage: ' + gameData.damage);
    closePopup('upgradePopup');
  } else { alert('Pi tidak cukup!'); }
}

function useBomb() {
  if(gameData.bombs > 0 && isGameRunning){
    gameData.bombs--;
    enemies = []; // bom bersihin semua musuh
    gameData.score += 50;
    alert('BOM MELEDAK! +50 Score');
    updateUI();
  } else { alert('BOM HABIS! Beli di Upgrade'); }
}
document.getElementById('bomBtn').onclick = useBomb;

function drawPlayer() {
  ctx.fillStyle = '#6F2DA8';
  ctx.beginPath();
  ctx.moveTo(player.x, player.y - 20);
  ctx.lineTo(player.x - 15, player.y + 10);
  ctx.lineTo(player.x + 15, player.y + 10);
  ctx.closePath();
  ctx.fill();
  // Api
  ctx.fillStyle = '#FFD700';
  ctx.beginPath();
  ctx.moveTo(player.x, player.y + 10);
  ctx.lineTo(player.x - 5, player.y + 20);
  ctx.lineTo(player.x + 5, player.y + 20);
  ctx.closePath();
  ctx.fill();
}

function updateGame() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  // Background bintang
  ctx.fillStyle = 'white';
  for(let i=0; i<50; i++){ ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 1, 1); }

  drawPlayer();

  if (Math.random() < 0.03 + gameData.level*0.002) enemies.push({x: Math.random()*canvas.width, y: 0, size: 20});

  enemies.forEach((e,i) => {
    e.y += 2 + gameData.level * 0.5;
    ctx.fillStyle = 'red';
    ctx.fillRect(e.x, e.y, e.size, e.size);
    if (e.y > player.y-20 && e.x > player.x-15 && e.x < player.x+15) {
      gameData.lives--; enemies.splice(i,1);
      if (gameData.lives <= 0) gameOver();
    }
    if (e.y > canvas.height) enemies.splice(i,1);
  });

  bullets.forEach((b,i) => {
    b.y -= 10;
    ctx.fillStyle = 'yellow';
    ctx.fillRect(b.x-2, b.y, 4, 10);
    enemies.forEach((e,j) => {
      if (b.y < e.y+20 && b.x > e.x && b.x < e.x+20) {
        gameData.pi += 1; gameData.score += 10 * gameData.damage;
        bullets.splice(i,1); enemies.splice(j,1);
      }
    });
    if (b.y < 0) bullets.splice(i,1);
  });

  if (gameData.score > gameData.level * 100) gameData.level++;
  updateUI();
}

function gameOver() {
  clearInterval(gameLoop); isGameRunning = false;
  document.getElementById('popupText').innerText = `Skor Akhir: ${gameData.score}`;
  openPopup('gameOverPopup');
  if (gameData.score > gameData.highScore) gameData.highScore = gameData.score;
}

document.getElementById('payBtn').onclick = () => {
  if (gameData.pi >= 1) {
    gameData.pi -= 1;
    closePopup('gameOverPopup');
    startGame();
  } else { alert('Pi Game tidak cukup! Top Up dulu'); }
}

function updateUI() {
  document.getElementById('score').innerText = gameData.score;
  document.getElementById('pi').innerText = gameData.pi;
  document.getElementById('lives').innerText = gameData.lives;
  document.getElementById('bomBtn').innerText = `💣 BOM ${gameData.bombs}`;
}
updateUI();
</script>
</body>
</html>
